<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Lerarenhulp: tabbladen en kaarten met afbeelding en audio voor je klas.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lerarenhulp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Lerarenhulp</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Load Flutter first. Do not put a blocking script before flutter_bootstrap.js:
    a synchronous Google api.js blocks HTML parsing and can leave a white screen
    until the Google CDN responds (or forever if blocked).
    Drive Picker only needs gapi later; defer keeps order after Flutter loads.
  -->
  <script src="flutter_bootstrap.js" defer></script>
  <script src="https://apis.google.com/js/api.js" defer></script>
</body>
</html>
